spring.application.name=service
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://postgres:5432/expenseservice
spring.datasource.username=admin
spring.datasource.password=root


# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

server.port = 9820

logging.level.org.springframework.security=DEBUG
logging.level.your.package.name=DEBUG


#kafka Properties
spring.kafka.producer.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=expense-info-consumer-group
spring.kafka.consumer.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value.deserializer=com.expence.service.Consumer.ExpenseDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packeges=*
spring.kafka.topic-json.name=expense_service
spring.kafka.consumer.properties.spring.json.type.mapping=com.expence.service.DTOs.ExpenseDTO
